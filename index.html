<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>珍北平 · 營運中心</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
      background: #f5f0eb;
      min-height: 100vh;
      color: #2c1a0e;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #8b3a1a 0%, #c05621 100%);
      color: white;
      padding: 28px 24px 24px;
      text-align: center;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    header p {
      margin-top: 6px;
      font-size: 0.85rem;
      opacity: 0.85;
      letter-spacing: 0.1em;
    }

    /* ── Main layout ── */
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    /* ── Section ── */
    section { margin-bottom: 32px; }
    section h2 {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #8b3a1a;
      text-transform: uppercase;
      margin-bottom: 12px;
      padding-left: 4px;
      border-left: 3px solid #c05621;
      padding-left: 10px;
    }

    /* ── Card grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .grid.stores {
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    }

    /* ── Card ── */
    a.card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px 12px;
      background: white;
      border-radius: 14px;
      text-decoration: none;
      color: #2c1a0e;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      text-align: center;
    }
    a.card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(139,58,26,0.15);
    }
    a.card:active {
      transform: translateY(0);
    }

    .card .icon {
      font-size: 2rem;
      line-height: 1;
    }
    .card .label {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .card .sub {
      font-size: 0.72rem;
      color: #8b6f5e;
      line-height: 1.3;
    }

    /* Store cards (smaller) */
    .grid.stores a.card {
      padding: 14px 8px;
      gap: 6px;
    }
    .grid.stores .icon { font-size: 1.4rem; }
    .grid.stores .label { font-size: 0.82rem; }

    /* Accent colors per section */
    .overview a.card  { border-top: 3px solid #c05621; }
    .daily    a.card  { border-top: 3px solid #2d7d46; }
    .stores   a.card  { border-top: 3px solid #1a5f8b; }
    .tools    a.card  { border-top: 3px solid #6b4fa0; }

    /* Footer */
    footer {
      text-align: center;
      font-size: 0.72rem;
      color: #b09080;
      padding-bottom: 24px;
    }
  </style>
</head>
